services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    cap_add:
      - SYS_NICE
    restart: always
    environment:
      - MYSQL_DATABASE=testdb
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb.sql:/docker-entrypoint-initdb.d/initdb.sql
    networks:
      - default

  ai-worker:
    container_name: ai-worker
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - default

  backend-service:
    container_name: backend-service
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AI_WORKER_BASE_URL=http://ai-worker:8000
      - AI_WORKER_MOCK_ENABLED=false
    depends_on:
      - mysql
      - ai-worker
    networks:
      - default

networks:
  default:
    name: backend-service

volumes:
  mysql_data:
